server {
    listen 80;
    listen [::]:80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    location ^~ /sample-frontend {
        alias /usr/share/nginx/html;

        try_files $uri $uri/ /index.html;
        include /etc/nginx/mime.types
    }
}
