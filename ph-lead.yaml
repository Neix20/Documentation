            readOnly: false
        - name: x-aia-request-id
          in: header
          description: Unique id for the request for tracking purposes
          required: true
          allowEmptyValue: false
          schema:
            type: string
            description: Unique id for the request for tracking purposes
            readOnly: false
      responses:
        '200':
          description: Successfully retrieved the master data information
