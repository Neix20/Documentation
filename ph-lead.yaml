openapi: 3.0.1
info:
  title: ph.il
  description: |+
    * This API provides operation for Lead v1, v2, v3 and Product management
    * Target clients for this API include
      * Lead management frontend applications which can be AIA's internal applications or AIA partner's applications.
      * Partner's backend applications submitting leads.
      * AIA's backend processes which handle partner's lead submissions in the form of batch files.
      * Current implementation provides an operation for retrieving a list of products. The returned list only includes high-level product information such as product category,name, description, code.
  version: v1.0
  x-base-file-version: '1.5'
  x-swagger-file-version: '1.9'
servers:
  - url: https://phaia-firestorm-dev.aiaazure.biz/ph/il
security:
  - oAuth2Token: []
paths:
