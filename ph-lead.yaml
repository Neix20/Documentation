      parameters:
        - name: Authorization
          in: header
          description: 'An access token issued by an AIA Authorization server. This will have the format Bearer + {space} + {accessToken}. Example: Bearer KGNsaWVudF9pZDpjbGllbnRfc2VjcmV0KQ=='
